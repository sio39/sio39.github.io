    <style>
        /* TOPページの基本スタイルを継承 */
        :root {
            --primary-color: #3b82f6;
            --primary-dark: #1d4ed8;
            --text-main: #0f172a;
            --text-sub: #475569;

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Sans", Meiryo, sans-serif;
            margin: 0; padding-top: 100px; /* ヘッダー分の余白 */

            display: flex; flex-direction: column; align-items: center;

        /* --- 共通ヘッダー（TOPページと統一） --- */

            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background: var(--header-bg); backdrop-filter: blur(8px);
            z-index: 9999; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center;
        }
        .header-container {
            width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 24px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header-left { display: flex; align-items: center; gap: 40px; }
        .logo { font-size: 22px; font-weight: 800; text-decoration: none; color: var(--text-main); }
        .logo span { color: var(--primary-color); }
        nav { display: flex; gap: 5px; }
        nav a { color: var(--text-sub); font-weight: 600; font-size: 15px; padding: 8px 16px; border-radius: 8px; text-decoration: none; }
        nav a:hover { background-color: #eff6ff; color: var(--primary-color); }
        nav a.active { background-color: var(--primary-color); color: white; }
        .header-sns { display: flex; align-items: center; gap: 10px; }
        .sns-icon { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 10px; color: white !important; font-size: 18px; text-decoration: none; }
        .sns-icon.x { background: #14171a; }
        .sns-icon.youtube { background: #ff0000; }
        .sns-icon.note { background: #2cb696; font-weight: 800; font-size: 15px; }

        /* --- ボード専用スタイル --- */
        .title-area { text-align: center; margin-bottom: 25px; }
        h1 { font-size: 1.8rem; font-weight: 800; margin: 0 0 10px 0; }
        #csv-update-time { font-size: 1.05rem; font-weight: 700; color: #ef4444; }

        .mika-selection-area { width: 100%; max-width: 1100px; margin-bottom: 30px; display: none; }
        .mika-header { display: flex; align-items: center; background: #1e293b; color: white; padding: 12px 20px; border-radius: 12px 12px 0 0; font-size: 0.95rem; }
        .mika-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; background: #f1f5f9; padding: 15px; border-radius: 0 0 12px 12px; border: 1px solid var(--border-color); }
        .mika-card { background: white; border: 2px solid var(--border-color); border-radius: 12px; padding: 16px; display: flex; justify-content: space-between; align-items: center; }
        
        .info-text { font-size: 0.85rem; width: 100%; max-width: 1100px; margin-bottom: 30px; background: white; padding: 20px; border-radius: 12px; border-left: 5px solid var(--primary-color); }

        .table-container { width: 100%; max-width: 1200px; background: white; border-radius: 16px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); overflow: auto; max-height: 70vh; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 850px; }
        thead th { position: sticky; top: 0; z-index: 10; background: #1e293b; color: white; font-size: 0.8rem; padding: 14px 10px; }
        td { padding: 14px 10px; text-align: center; border-bottom: 1px solid var(--border-color); font-size: 0.88rem; }
        
        tr.row-highlight td { background-color: var(--highlight-bg) !important; }
        .col-rvol-style { background: #fffef3 !important; font-weight: 700; color: #854d0e; }
        .buy-highlight { background: var(--buy-bg) !important; color: var(--buy-text) !important; font-weight: 800; }
        .volume-spike { background: var(--spike-bg) !important; box-shadow: inset 0 0 0 2px var(--spike-border); }

        /* スマホ対応 */
        @media (max-width: 768px) {
            body { padding-top: 140px; }
            .header { height: auto; padding: 10px 0; }
            .header-container { flex-direction: column; gap: 10px; }
            .header-left { flex-direction: column; gap: 5px; }
            nav { width: 100%; justify-content: center; overflow-x: auto; white-space: nowrap; }
            nav a { font-size: 14px; padding: 6px 10px; }
        }

<div class="title-area">
    <h1>銘柄リアルタイムボード</h1>
    <div id="csv-update-time">読み込み中...</div>
    <div id="last-load" style="font-size:0.7rem; color:#94a3b8; margin-top:5px;"></div>
</div>

<div class="mika-selection-area" id="mikaSelection">
    <div class="mika-header">
        <span>👩‍💼 <strong>AI MIKA 厳選銘柄</strong></span>
    </div>
    <div class="mika-cards" id="mikaCards"></div>
</div>

<div class="info-text">
    <strong>【データ更新】</strong> 5分毎に自動更新されます。<br>
    <small>※判定：<strong>(A3 × RVOL) ≧ 180 ＋ RVOL 1.5以上 ＋ 価格 > VWAP</strong> で「🔥買い」を表示。</small>
</div>

<div class="table-container">
    <table id="csv-table">
        <thead id="table-header"></thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script>
let prevVolumeMap = new Map();
function formatNum(val) {
    let n = parseFloat(val.replace(/,/g, ''));
    if (isNaN(n)) return val;
    return val.includes('.') ? val : n.toLocaleString();
}
async function loadCSV(){
    try{
        const response = await fetch('data_push.csv',{cache:"no-store"});
        const data = await response.text();
        const rows = data.split(/\r?\n/).filter(r=>r.trim()!=="");
        renderTable(rows);
        updateMikaSelection(rows);
        document.getElementById('last-load').textContent = '更新: ' + new Date().toLocaleTimeString();
    } catch(e) { console.error(e) }
}
function renderTable(rows) {
    const tableHeader = document.getElementById('table-header');
    const tableBody = document.getElementById('table-body');
    tableHeader.innerHTML = ''; tableBody.innerHTML = '';
    const hideIndices = [3, 7, 11];
    let stockCount = 0;
    rows.forEach((row, index) => {
        if(row.includes("Update:")){
            document.getElementById('csv-update-time').innerHTML = '<span style="font-size:0.85rem; color:#64748b; font-weight:normal;">最終更新:</span> ' + row.split(',')[0].replace("Update:","").trim();
            return;
        }
        const columns = row.split(',');
        const tr = document.createElement('tr');
        if(index !== 0 && columns[11]?.replace(/"/g,'').trim() === "1") tr.classList.add('row-highlight');
        const noCell = (index === 0) ? document.createElement('th') : document.createElement('td');
        if(index === 0) { noCell.textContent = 'No.'; noCell.style.width = '45px'; }
        else { stockCount++; noCell.textContent = stockCount; noCell.style.color = '#94a3b8'; noCell.style.fontSize = '0.75rem'; }
        tr.appendChild(noCell);
        for(let i = 0; i <= 10; i++) {
            if(hideIndices.includes(i)) continue;
            const cell = (index === 0) ? document.createElement('th') : document.createElement('td');
            let val = (columns[i] || "").replace(/"/g,'').trim();
            if(index === 0) { cell.textContent = val; } 
            else {
                if(i === 8 || i === 9) {
                    cell.classList.add("col-rvol-style");
                    let num = parseFloat(val);
                    if(!isNaN(num)){
                        if(num >= 2) cell.classList.add("volume-spike");
                        cell.textContent = num.toFixed(2);
                    } else cell.textContent = val;
                } else if(i === 10) {
                    cell.textContent = val;
                    if(val.includes("買い")) cell.classList.add("buy-highlight");
                } else { cell.textContent = (i === 0) ? val.replace(/,/g, '') : formatNum(val); }
            }
            tr.appendChild(cell);
        }
        if(index === 0) tableHeader.appendChild(tr); else tableBody.appendChild(tr);
    });
}
function updateMikaSelection(rows) {
    const allPicks = rows.slice(1).map(row => {
        const c = row.split(',');
        if (c.length < 17) return null;
        const code = c[0].replace(/"/g,'').trim();
        const name = c[1].replace(/"/g,'').trim();
        const price = parseFloat(c[2]?.replace(/,/g,'') || 0);
        const vwap = parseFloat(c[5]?.replace(/,/g,'') || 0);
        const a3 = parseFloat(c[13] || 0);
        const judge = c[10] || "";
        const marginRatio = parseFloat(c[16]?.replace(/,/g, '') || 0);
        return { code, name, a3, vwap, price, judge, marginRatio };
    }).filter(d => d && d.a3 >= 180 && d.marginRatio < 20 && d.price > d.vwap && (d.judge.includes("🔥") || d.judge.includes("買い")));
    const picks = allPicks.sort((a,b) => b.a3 - a.a3).slice(0, 3);
    const container = document.getElementById('mikaCards');
    const area = document.getElementById('mikaSelection');
    if (picks.length > 0) {
        area.style.display = 'block';
        container.innerHTML = picks.map((p, i) => `
            <div class="mika-card">
                <div style="display:flex; align-items:center;">
                    <span style="font-weight:800; color:var(--gold); margin-right:10px;">#${i+1}</span>
                    <div><div style="color:var(--primary-dark); font-weight:700;">${p.code}</div><div style="font-weight:700; font-size:0.9rem;">${p.name}</div></div>
                </div>
                <div style="text-align:right;"><div style="font-size:0.6rem; color:var(--text-sub);">SCORE</div><div style="font-weight:800; color:var(--gold); font-size:1.1rem;">${p.a3.toFixed(1)}</div></div>
            </div>
        `).join('');
    } else { area.style.display = 'none'; }
}
loadCSV();
setInterval(loadCSV, 30000);
</script>
