<h1>銘柄リアルタイムボード</h1>
<div id="last-load" style="font-size: 0.8rem; color: #888;">読み込み中...</div>
<div id="csv-update-time" style="font-size: 0.95rem; font-weight: bold; color: #d9534f; margin-bottom: 20px;">CSV確認中...</div>

<p>※自動更新作動中は５分毎に更新されます。<br>
RVOL×補正係数が1.5以上。且つ前日比プラスなら買いサイン。<br>
補正係数は「330÷経過分数」です。<br>
買いサインが出ていれば後はVWAPとの位置関係とチャートを見て上がりそうならインです<br>
※２０日平均出来高は手動入力のためデータは最新ではありません。そのため誤差があります。</p>

<div class="table-container">
    <table id="csv-table">
        <thead id="table-header"></thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script>
    async function loadCSV() {
        try {
            const response = await fetch('data_push.csv', { cache: "no-store" });
            const data = await response.text();
            
            // 行を分けます。空行も消さずに全て保持します！
            const rows = data.split(/\r?\n/);
            
            const tableHeader = document.getElementById('table-header');
            const tableBody = document.getElementById('table-body');
            
            tableHeader.innerHTML = '';
            tableBody.innerHTML = '';

            rows.forEach((row, index) => {
                // Update行の処理
                if (row.includes("Update:")) {
                    const time = row.split(',')[0].replace("Update:", "").replace(/"/g, '').trim();
                    document.getElementById('csv-update-time').textContent = '最終更新: ' + time;
                }

                const columns = row.split(',');
                // CSVが35行目付近で終わるまで、列が少なくとも1つあれば行を作ります
                if (columns.length <= 1 && !row.includes("Update:")) return;

                const tr = document.createElement('tr');

                columns.forEach((colText) => {
                    const cell = (index === 0) ? document.createElement('th') : document.createElement('td');
                    
                    // 文字のお掃除（" や 改行、特殊な空白を全部消す）
                    let cleanValue = colText.replace(/[\r\n\t]/g, '').replace(/"/g, '').trim();
                    cell.textContent = cleanValue;

                    // 「買い」という文字が含まれていたら赤くする（部分一致で確実に！）
                    if (cleanValue.indexOf("買い") !== -1) {
                        cell.className = "buy-active-cell";
                    }
                    tr.appendChild(cell);
                });

                if (index === 0) tableHeader.appendChild(tr);
                else tableBody.appendChild(tr);
            });

            document.getElementById('last-load').textContent = 'ブラウザ更新: ' + new Date().toLocaleString();
        } catch (e) { console.error(e); }
    }

    loadCSV();
    setInterval(loadCSV, 30000);
</script>
