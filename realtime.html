<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>銘柄データ自動更新ボード</title>
    <style>
        /* --- 全体の見た目 --- */
        :root {
            --primary-color: #007bff;
            --bg-color: #f4f7f9;
            --border-color: #e2e8f0;
            --accent-yellow: #fff9e6; 
            --highlight-orange: #ff9800;
        }

        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Sans", sans-serif; 
            margin: 0; padding: 140px 10px 60px 10px; 
            background-color: var(--bg-color); text-align: center; color: #334155;
        }

        /* --- 固定ヘッダー --- */
        .header {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px);
            z-index: 9999; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 24px; box-sizing: border-box;
        }

        .logo { font-size: 18px; font-weight: 800; color: var(--primary-color); text-decoration: none; }
        nav { display: flex; gap: 20px; }
        nav a { color: #64748b; text-decoration: none; font-weight: 600; }
        nav a.active { color: var(--primary-color); }

        /* --- テキストエリア --- */
        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        .csv-time { font-size: 1rem; font-weight: bold; color: #d9534f; margin-bottom: 20px; }
        .info-box { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: inline-block; border: 1px solid #e2e8f0; font-size: 0.9rem; }

        /* --- テーブル設定 --- */
        .table-container { 
            width: 100%; max-width: 1100px; margin: 0 auto;
            background: white; border-radius: 12px; shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow-x: auto; border: 1px solid #ddd;
        }

        table { width: 100%; border-collapse: collapse; white-space: nowrap; font-variant-numeric: tabular-nums; }
        th, td { padding: 12px 10px; border-bottom: 1px solid #eee; text-align: center; font-size: 0.85rem; }
        th { background-color: #444; color: white; }

        /* J列(10番目)とK列(11番目)の強調 */
        td:nth-child(10), td:nth-child(11) { background-color: var(--accent-yellow); font-weight: bold; color: #d9534f; }
        th:nth-child(10), th:nth-child(11) { background-color: var(--highlight-orange); }

        /* 「買い」セルの特別色 */
        .buy-cell { background-color: #d9534f !important; color: white !important; font-weight: bold; border-radius: 4px; }

        tr:nth-child(even) { background-color: #fafafa; }
        tr:hover { background-color: #f1f8ff; }
    </style>
</head>
<body>

<header class="header">
    <a href="#" class="logo">AIスコア投資研究所</a>
    <nav>
        <a href="#">TOP</a>
        <a href="#" class="active">リアルタイムボード</a>
    </nav>
</header>

<h1>銘柄リアルタイムボード</h1>
<div id="csv-update-time" class="csv-time">CSVデータ読み込み中...</div>

<div class="info-box">
    5分ごとに自動更新 🌸 <strong>J列・K列</strong>が重要データです！
</div>

<div class="table-container">
    <table id="csv-table">
        <thead id="table-header"></thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script>
    async function loadCSV() {
        const csvFilePath = 'data_push.csv';
        try {
            const response = await fetch(csvFilePath, { cache: "no-store" });
            if (!response.ok) throw new Error('CSVがまだ準備できていないようです');

            const data = await response.text();
            const rows = data.split(/\r?\n/).filter(row => row.trim() !== '');
            
            const tableHeader = document.getElementById('table-header');
            const tableBody = document.getElementById('table-body');
            const csvTimeDisp = document.getElementById('csv-update-time');

            tableHeader.innerHTML = '';
            tableBody.innerHTML = '';

            let headerColCount = 0;

            rows.forEach((row, index) => {
                // Update行の処理
                if (row.includes("Update:")) {
                    csvTimeDisp.textContent = 'CSV更新: ' + row.replace(/"/g, '').replace("Update:", "");
                    return;
                }

                const columns = row.split(',');
                const tr = document.createElement('tr');

                if (index === 0) {
                    headerColCount = columns.length;
                    columns.forEach(col => {
                        const th = document.createElement('th');
                        th.textContent = col.replace(/"/g, '');
                        tr.appendChild(th);
                    });
                    tableHeader.appendChild(tr);
                } else {
                    for (let i = 0; i < headerColCount; i++) {
                        const td = document.createElement('td');
                        let val = (columns[i] || "").replace(/"/g, '');
                        td.textContent = val;
                        if (val === "買い") { td.classList.add('buy-cell'); }
                        tr.appendChild(td);
                    }
                    tableBody.appendChild(tr);
                }
            });
        } catch (e) {
            document.getElementById('csv-update-time').textContent = e.message;
        }
    }

    loadCSV();
    setInterval(loadCSV, 30000);
</script>

</body>
</html>
