<div class="table-container">

        <table id="csv-table">

            <tbody id="table-body"></tbody>
        </table>
    </div>

<script>
function formatNum(val) {
    let n = parseFloat(val.replace(/,/g, ''));
    if (isNaN(n)) return val;
    if (val.includes('.')) return val;
    return n.toLocaleString();
}

async function loadCSV(){
    try{
        const response = await fetch('data_push.csv',{cache:"no-store"});
        const data = await response.text();
        const rows = data.split(/\r?\n/).filter(r=>r.trim()!=="")
        const tableHeader = document.getElementById('table-header')
        const tableBody = document.getElementById('table-body')

        tableHeader.innerHTML = ''
        tableBody.innerHTML = ''
        
        const hideIndices = [3, 7, 11];
        let stockCount = 0;

        rows.forEach((row, index) => {
            if(row.includes("Update:")){
                document.getElementById('csv-update-time').innerHTML = 
                    '<span style="font-size:0.85rem; color:#64748b; font-weight:normal;">最終更新:</span> ' + row.split(',')[0].replace("Update:","").trim();
                return
            }

            const columns = row.split(',')
            const tr = document.createElement('tr')

            if(index !== 0 && columns[11]) {
                if(columns[11].replace(/"/g,'').trim() === "1") {
                    tr.classList.add('row-highlight');
                }
            }

            // No.列の追加
            const noCell = (index === 0) ? document.createElement('th') : document.createElement('td');
            if(index === 0) {
                noCell.textContent = 'No.';
                noCell.style.width = '45px';
            } else {
                stockCount++;
                noCell.textContent = stockCount;
                noCell.style.color = '#94a3b8';
                noCell.style.fontSize = '0.75rem';
            }
            tr.appendChild(noCell);

            for(let i = 0; i <= 10; i++) {
                if(hideIndices.includes(i)) continue;

                const colText = columns[i] || "";
                const cell = (index === 0) ? document.createElement('th') : document.createElement('td')
                let val = colText.replace(/"/g,'').trim()

                if(index === 0){
                    cell.textContent = val;
                } else {
                    if(i === 0) {
                        cell.textContent = val.replace(/,/g, '');
                    } else if(i === 8 || i === 9) {
                        cell.classList.add("col-rvol-style");
                        let num = parseFloat(val);
                        if(!isNaN(num)){
                            if(num >= 2) cell.classList.add("volume-spike");
                            cell.textContent = num.toFixed(2);
                        } else { cell.textContent = val; }
                    } else if(i === 10) {
                        cell.textContent = val;
                        if(val.includes("買い")) {
                            cell.classList.add("buy-highlight");
                        }
                    } else {
                        let numVal = parseFloat(val.replace(/,/g,''));
                        cell.textContent = (!isNaN(numVal) && val.length > 3 && !val.includes('.')) 
                                            ? formatNum(val) : val;
                    }
                }
                tr.appendChild(cell)
            }

            if(index === 0) tableHeader.appendChild(tr);
            else tableBody.appendChild(tr);
        })
        document.getElementById('last-load').textContent = 'ブラウザ更新: ' + new Date().toLocaleTimeString();
    } catch(e) { console.error(e) }
}

loadCSV();
setInterval(loadCSV, 30000);
</script>
