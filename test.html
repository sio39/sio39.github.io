<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIスコア投資研究所 - スコア計算機</title>
    <style>
        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f0f4f8; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px;
        }
        .card { 
            background: white; padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 100%; max-width: 400px; text-align: center; border: 2px solid #3498db;
        }
        h2 { color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .input-group { text-align: left; margin-bottom: 12px; }
        label { font-size: 13px; color: #555; font-weight: bold; }
        input { 
            width: 100%; padding: 10px; margin-top: 5px; 
            border: 1px solid #bdc3c7; border-radius: 8px; box-sizing: border-box; 
            font-size: 16px; outline: none;
        }
        button { 
            background: #3498db; color: white; border: none; padding: 15px; 
            width: 100%; border-radius: 10px; cursor: pointer; 
            font-size: 18px; font-weight: bold; margin-top: 15px; transition: 0.3s;
        }
        button:hover { background: #2980b9; }
        .result-box { 
            margin-top: 20px; padding: 15px; border-radius: 12px; background: #f9f9f9; text-align: left;
        }
        .score-val { font-size: 24px; font-weight: bold; color: #2c3e50; float: right; }
        .gap-val { font-size: 24px; font-weight: bold; color: #e67e22; float: right; }
        .clear-msg { 
            display: none; margin-top: 20px; padding: 15px; 
            background: #fff3cd; border: 2px solid #ffc107; border-radius: 10px;
            color: #856404; font-weight: bold; animation: flash 1s infinite alternate;
        }
        @keyframes flash { from { opacity: 1; } to { opacity: 0.7; } }
        .highlight { background: #ffeb3b !important; border: 2px solid #f44336 !important; scale: 1.05; }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <h2>📊 AIスコア計算機</h2>
    
    <div class="input-group"><label>PER</label><input type="number" id="h_val" step="0.01" placeholder="10.7"></div>
    <div class="input-group"><label>ROE</label><input type="number" id="l_val" step="0.01" placeholder="46.39"></div>
    <div class="input-group"><label>営業利益率</label><input type="number" id="r_val" step="0.1" placeholder="45.8"></div>
    <div class="input-group"><label>成長率</label><input type="number" id="s_val" step="0.1" placeholder="0"></div>
    <div class="input-group"><label>ネットキャッシュ率</label><input type="number" id="w_val" step="0.1" placeholder="0"></div>
    
    <button onclick="calculateAll()">一括スコア計算！</button>
    
    <div class="result-box">
        <div>A3スコア: <span id="resA3" class="score-val">---</span></div><br style="clear:both;">
        <div style="margin-top:10px;">A5スコア: <span id="resA5" class="score-val">---</span></div><br style="clear:both;">
        <div style="margin-top:10px; border-top: 1px solid #ddd; pt:10px;">ギャップ比: <span id="resGap" class="gap-val">---</span></div><br style="clear:both;">
    </div>

    <div id="recommendMsg" class="clear-msg">
        🌟 条件クリアしました！<br>監視銘柄入り推奨します！
    </div>
</div>

<script>
function calculateAll() {
    // 値の取得
    const hIn = document.getElementById('h_val').value;
    const lIn = document.getElementById('l_val').value;
    const rIn = document.getElementById('r_val').value;
    const sIn = document.getElementById('s_val').value;
    const wIn = document.getElementById('w_val').value;

    // Excel共通ルール
    const r = (rIn === "" || parseFloat(rIn) <= 0) ? 20 : parseFloat(rIn);
    const l = parseFloat(lIn) || 0;
    const h = (hIn !== "" && parseFloat(hIn) > 0) ? parseFloat(hIn) : 15;
    const s = parseFloat(sIn) || 0;
    const w = parseFloat(wIn) || 0;

    // --- A3計算 ---
    const a3 = ((r / 20) * (l / 15)) / (h / 15) * 100;
    const finalA3 = Math.round(a3);

    // --- A5計算 ---
    // S列部分: ((MIN(MAX(S133,0),50)/15)+1)
    const sPart = (Math.min(Math.max(s, 0), 50) / 15) + 1;
    // W列部分: (1+MIN(MAX(W133,-30),50)/200)
    const wPart = 1 + (Math.min(Math.max(w, -30), 50) / 200);
    
    const a5 = ((r / 20) * (l / 15) * sPart * wPart) / (h / 15) * 100;
    const finalA5 = Math.round(a5);

    // --- ギャップ比 ---
    const gap = finalA3 === 0 ? 0 : (finalA5 / finalA3);

    // 表示
    document.getElementById('resA3').innerText = finalA3;
    document.getElementById('resA5').innerText = finalA5;
    document.getElementById('resGap').innerText = gap.toFixed(2);

    // 条件チェック (A3>=120 かつ Gap>=2.5)
    const msg = document.getElementById('recommendMsg');
    const card = document.getElementById('mainCard');
    
    if (finalA3 >= 120 && gap >= 2.5) {
        msg.style.display = "block";
        card.classList.add('highlight');
    } else {
        msg.style.display = "none";
        card.classList.remove('highlight');
    }
}
</script>

</body>
</html>
