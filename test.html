<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI MIKA 銘柄分析ツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #0f0f1a;
    --border: #1a1a2e;
    --accent: #00ffe0;
    --accent2: #ff3fa4;
    --accent3: #ffe03f;
    --text: #e0e0f0;
    --dim: #555577;
    --gold: #ffd700;
    --red: #ff4444;
    --green: #00ff88;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    padding: 20px;
    background-image: 
      radial-gradient(ellipse at 10% 20%, rgba(0,255,224,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(255,63,164,0.04) 0%, transparent 50%);
  }

  header {
    text-align: center;
    padding: 30px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }

  .logo {
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 28px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 2px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 12px;
    color: var(--dim);
    margin-top: 6px;
    font-family: 'Share Tech Mono', monospace;
  }

  /* CSV入力エリア */
  .input-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .section-label {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    margin-bottom: 12px;
  }

  .csv-url-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }

  input[type="text"] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: var(--accent); }

  .btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 20px;
    border-radius: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: 1px;
  }

  .btn:hover {
    background: var(--accent);
    color: var(--bg);
  }

  .btn-primary {
    border-color: var(--accent2);
    color: var(--accent2);
    font-size: 14px;
    padding: 14px 32px;
  }

  .btn-primary:hover {
    background: var(--accent2);
    color: #fff;
  }

  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* 選定基準設定 */
  .criteria-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .criteria-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
  }

  .criteria-item label {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
    display: block;
    margin-bottom: 6px;
  }

  .priority-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .priority-badge {
    background: var(--border);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }

  select, input[type="number"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px;
    outline: none;
    width: 100%;
  }

  input[type="number"] { width: 80px; }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }

  .toggle {
    position: relative;
    width: 40px;
    height: 22px;
  }

  .toggle input { opacity: 0; width: 0; height: 0; }

  .slider {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 22px;
    cursor: pointer;
    transition: 0.2s;
  }

  .slider:before {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    left: 3px;
    top: 3px;
    background: var(--dim);
    border-radius: 50%;
    transition: 0.2s;
  }

  input:checked + .slider { background: rgba(0,255,224,0.2); }
  input:checked + .slider:before {
    transform: translateX(18px);
    background: var(--accent);
  }

  /* 実行ボタンエリア */
  .run-section {
    text-align: center;
    margin: 20px 0;
  }

  /* ローディング */
  .loading {
    display: none;
    text-align: center;
    padding: 40px;
  }

  .loading.active { display: block; }

  .loading-text {
    font-family: 'Share Tech Mono', monospace;
    color: var(--accent);
    font-size: 13px;
    animation: blink 1s infinite;
  }

  @keyframes blink { 50% { opacity: 0.3; } }

  .spinner {
    width: 40px;
    height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* 結果エリア */
  .results { display: none; }
  .results.active { display: block; }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .result-title {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent2);
    font-family: 'Share Tech Mono', monospace;
  }

  .timestamp {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
  }

  /* 銘柄カード */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.4s ease forwards;
    opacity: 0;
  }

  .card:nth-child(1) { animation-delay: 0.1s; border-color: rgba(255,215,0,0.3); }
  .card:nth-child(2) { animation-delay: 0.2s; border-color: rgba(192,192,192,0.2); }
  .card:nth-child(3) { animation-delay: 0.3s; }

  @keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
    from { opacity: 0; transform: translateY(12px); }
  }

  .card-rank {
    position: absolute;
    top: 16px;
    right: 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 32px;
    font-weight: 900;
    opacity: 0.08;
    color: #fff;
  }

  .rank-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 3px;
    font-family: 'Share Tech Mono', monospace;
    margin-bottom: 12px;
  }

  .card:nth-child(1) .rank-badge { color: var(--gold); }
  .card:nth-child(2) .rank-badge { color: #c0c0c0; }
  .card:nth-child(3) .rank-badge { color: #cd7f32; }

  .card-code {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .card-name {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 16px;
  }

  .metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }

  .metric {
    background: var(--bg);
    border-radius: 6px;
    padding: 8px 10px;
  }

  .metric-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--dim);
    margin-bottom: 3px;
  }

  .metric-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    font-weight: 700;
  }

  .bolt-on { color: var(--accent2); }
  .bolt-count { color: var(--accent3); }
  .rvol-val { color: var(--green); }
  .score-val { color: var(--accent); }

  .bolt-badge {
    display: inline-block;
    background: rgba(255,63,164,0.15);
    border: 1px solid var(--accent2);
    color: var(--accent2);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 4px;
    margin-bottom: 10px;
    letter-spacing: 2px;
  }

  .reason {
    font-size: 12px;
    color: var(--dim);
    line-height: 1.6;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }

  /* AI分析テキスト */
  .ai-analysis {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 0 12px 12px 0;
    padding: 20px;
    margin-top: 16px;
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    font-family: 'Zen Kaku Gothic New', sans-serif;
  }

  .ai-label {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    margin-bottom: 10px;
  }

  /* エラー */
  .error-box {
    background: rgba(255,68,68,0.1);
    border: 1px solid var(--red);
    border-radius: 8px;
    padding: 16px;
    color: var(--red);
    font-size: 13px;
    display: none;
    margin-top: 16px;
  }

  .error-box.active { display: block; }

  /* データプレビュー */
  .data-preview {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    margin-top: 8px;
    padding: 8px 12px;
    background: var(--bg);
    border-radius: 6px;
    display: none;
  }

  .data-preview.active { display: block; }

  @media (max-width: 600px) {
    .criteria-grid { grid-template-columns: 1fr; }
    .cards { grid-template-columns: 1fr; }
    .csv-url-row { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">◆ AI MIKA SYSTEM ◆</div>
  <h1>銘柄<span>分析</span>ツール</h1>
  <div class="subtitle">BOLT × RVOL × A3SCORE → TOP 3 PICKS</div>
</header>

<!-- CSV設定 -->
<div class="input-section">
  <div class="section-label">▸ DATA SOURCE</div>
  <div class="csv-url-row">
    <input type="text" id="csvUrl" 
      value="https://sio39.github.io/data_push.csv" 
      placeholder="CSV URL を入力">
    <button class="btn" onclick="loadCSV()">読み込む</button>
  </div>
  <div class="data-preview" id="dataPreview"></div>
</div>

<!-- 選定基準 -->
<div class="input-section">
  <div class="section-label">▸ 選定基準（変更可能）</div>
  <div class="criteria-grid">

    <div class="criteria-item">
      <div class="priority-row">
        <span class="priority-badge">優先1</span>
        <label style="margin:0">買いサイン・BOLT判定</label>
      </div>
      <div class="toggle-row">
        <label class="toggle">
          <input type="checkbox" id="boltRequired" checked>
          <span class="slider"></span>
        </label>
        <span style="font-size:12px;color:var(--dim)">BOLT必須</span>
      </div>
    </div>

    <div class="criteria-item">
      <div class="priority-row">
        <span class="priority-badge">優先2</span>
        <label style="margin:0">BOLT回数</label>
      </div>
      <select id="boltWeight">
        <option value="high" selected>重視する（大口資金優先）</option>
        <option value="medium">普通</option>
        <option value="low">あまり重視しない</option>
      </select>
    </div>

    <div class="criteria-item">
      <div class="priority-row">
        <span class="priority-badge">優先3</span>
        <label style="margin:0">RVOL 最低ライン</label>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="number" id="rvolMin" value="1.5" min="1" max="5" step="0.1">
        <span style="font-size:12px;color:var(--dim)">以上</span>
      </div>
    </div>

    <div class="criteria-item">
      <div class="priority-row">
        <span class="priority-badge">優先4</span>
        <label style="margin:0">補正A3スコア</label>
      </div>
      <select id="scoreWeight">
        <option value="high" selected>重視する</option>
        <option value="medium">普通</option>
        <option value="low">あまり重視しない</option>
      </select>
    </div>

  </div>

  <div class="criteria-item" style="margin-top:4px">
    <label>📝 追加指示（任意）</label>
    <input type="text" id="extraPrompt" placeholder="例：値上がり率がプラスのものだけ選んで" style="margin-top:8px">
  </div>
</div>

<!-- 実行 -->
<div class="run-section">
  <button class="btn btn-primary" id="analyzeBtn" onclick="analyze()" disabled>
    ⚡ AI MIKAが分析する
  </button>
</div>

<!-- ローディング -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">MIKA分析中...</div>
</div>

<!-- エラー -->
<div class="error-box" id="errorBox"></div>

<!-- 結果 -->
<div class="results" id="results">
  <div class="result-header">
    <div class="result-title">▸ AI MIKA 厳選ベスト3</div>
    <div class="timestamp" id="timestamp"></div>
  </div>

  <div class="cards" id="cards"></div>

  <div class="ai-label">▸ MIKA COMMENT</div>
  <div class="ai-analysis" id="aiAnalysis"></div>
</div>

<script>
let csvData = null;
let parsedStocks = [];

// CSV読み込み
async function loadCSV() {
  const url = document.getElementById('csvUrl').value.trim();
  const preview = document.getElementById('dataPreview');
  
  try {
    preview.className = 'data-preview';
    preview.textContent = '読み込み中...';
    preview.classList.add('active');

    const res = await fetch(url + '?t=' + Date.now());
    const text = await res.text();
    csvData = text;
    
    const lines = text.split('\n').filter(l => l.trim());
    parsedStocks = parseCSV(lines);
    
    preview.textContent = `✓ ${parsedStocks.length} 銘柄読み込み完了 | 最終更新: ${getUpdateTime(lines)}`;
    document.getElementById('analyzeBtn').disabled = false;
    showError('');
  } catch(e) {
    preview.textContent = '✗ 読み込み失敗: ' + e.message;
    showError('CSVの読み込みに失敗しました。URLを確認してください。\n' + e.message);
  }
}

function parseCSV(lines) {
  const stocks = [];
  const header = lines[0].split(',');
  
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i];
    if (line.startsWith('Update:')) continue;
    const cols = line.split(',');
    if (cols.length < 5 || !cols[0]) continue;
    
    const stock = {
      code: cols[0]?.trim(),
      name: cols[1]?.trim(),
      price: parseFloat(cols[2]) || 0,
      change: cols[3]?.trim(),
      changePct: parseFloat(cols[4]) || 0,
      volume: parseFloat(cols[6]) || 0,
      rvol: parseFloat(cols[10]) || 0,
      bolt: cols[13]?.trim(),
      boltCount: parseInt(cols[14]) || 0,
      scoreA3: parseFloat(cols[15]) || 0,
      sign: cols[17]?.trim() || '',
    };
    
    if (stock.code && stock.name) stocks.push(stock);
  }
  return stocks;
}

function getUpdateTime(lines) {
  const updateLine = lines.find(l => l.startsWith('Update:'));
  return updateLine ? updateLine.split(',')[0].replace('Update:', '').trim() : '不明';
}

// 分析実行
async function analyze() {
  if (!parsedStocks.length) {
    showError('先にCSVを読み込んでください');
    return;
  }

  const boltRequired = document.getElementById('boltRequired').checked;
  const boltWeight = document.getElementById('boltWeight').value;
  const rvolMin = parseFloat(document.getElementById('rvolMin').value);
  const scoreWeight = document.getElementById('scoreWeight').value;
  const extraPrompt = document.getElementById('extraPrompt').value;

  // UI切り替え
  document.getElementById('loading').classList.add('active');
  document.getElementById('results').classList.remove('active');
  document.getElementById('analyzeBtn').disabled = true;
  showError('');

  const loadingTexts = [
    'データ解析中...',
    'BOLT判定スキャン中...',
    'RVOL計算中...',
    'MIKAが厳選中...'
  ];
  let li = 0;
  const lt = setInterval(() => {
    document.getElementById('loadingText').textContent = loadingTexts[li % loadingTexts.length];
    li++;
  }, 800);

  try {
    // スコアリング
    const scored = parsedStocks.map(s => {
      let score = 0;
      
      // BOLT判定
      if (s.bolt === 'BOLT!' || s.sign === '買いサイン' || s.sign === '🔥') score += 100;
      
      // BOLT回数
      const bw = boltWeight === 'high' ? 3 : boltWeight === 'medium' ? 2 : 1;
      score += s.boltCount * bw;
      
      // RVOL
      if (s.rvol >= rvolMin) score += s.rvol * 5;
      
      // A3スコア
      const sw = scoreWeight === 'high' ? 0.3 : scoreWeight === 'medium' ? 0.2 : 0.1;
      score += s.scoreA3 * sw;
      
      return { ...s, totalScore: score };
    });

    // フィルタ＆ソート
    let filtered = scored;
    if (boltRequired) {
      filtered = filtered.filter(s => 
        s.bolt === 'BOLT!' || s.sign === '買いサイン' || s.sign === '🔥'
      );
    }
    filtered = filtered.filter(s => s.rvol >= rvolMin);
    filtered.sort((a, b) => b.totalScore - a.totalScore);

    const top3 = filtered.slice(0, 3);
    
    // 上位20件のサマリをAIに渡す
    const top20summary = scored
      .sort((a, b) => b.totalScore - a.totalScore)
      .slice(0, 20)
      .map(s => `${s.code} ${s.name} BOLT:${s.bolt||'なし'} BOLT回数:${s.boltCount} RVOL:${s.rvol} A3:${s.scoreA3} 変化率:${s.changePct}%`)
      .join('\n');

    const criteriaText = `
選定基準：
- BOLT必須: ${boltRequired ? 'はい' : 'いいえ'}
- BOLT回数の重み: ${boltWeight}
- RVOL最低ライン: ${rvolMin}以上
- 補正A3スコアの重み: ${scoreWeight}
- 追加指示: ${extraPrompt || 'なし'}
`;

    const top3text = top3.map((s, i) => 
      `${i+1}位: ${s.code} ${s.name} (BOLT:${s.bolt||'なし'}, 回数:${s.boltCount}, RVOL:${s.rvol}, A3:${s.scoreA3}, 変化率:${s.changePct}%)`
    ).join('\n');

    // AI API呼び出し
    const prompt = `あなたは日本株のデイトレード・スウィングトレードの専門家AIアシスタント「MIKA」です。
以下のデータをもとに、上位3銘柄の推薦理由と注意点を簡潔に日本語で説明してください。

${criteriaText}

【選定された上位3銘柄】
${top3text}

【参考：スコア上位20銘柄の生データ】
${top20summary}

各銘柄について2〜3文で推薦理由を述べ、最後に全体的な市場コメントを1〜2文で追加してください。
投資は自己責任である旨も一言添えてください。`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    const aiText = data.content?.[0]?.text || '（コメントを取得できませんでした）';

    clearInterval(lt);
    document.getElementById('loading').classList.remove('active');

    renderResults(top3, aiText);

  } catch(e) {
    clearInterval(lt);
    document.getElementById('loading').classList.remove('active');
    document.getElementById('analyzeBtn').disabled = false;
    showError('分析中にエラーが発生しました：' + e.message);
  }
}

function renderResults(top3, aiText) {
  const rankLabels = ['🥇 1位', '🥈 2位', '🥉 3位'];
  const rankNums = ['01', '02', '03'];

  const cardsHTML = top3.map((s, i) => `
    <div class="card">
      <div class="card-rank">${rankNums[i]}</div>
      <div class="rank-badge">${rankLabels[i]}</div>
      ${(s.bolt === 'BOLT!' || s.sign === '買いサイン' || s.sign === '🔥') 
        ? '<div class="bolt-badge">⚡ BOLT / 買いサイン</div>' : ''}
      <div class="card-code">${s.code}</div>
      <div class="card-name">${s.name}</div>
      <div class="metrics">
        <div class="metric">
          <div class="metric-label">BOLT回数</div>
          <div class="metric-value bolt-count">${s.boltCount}回</div>
        </div>
        <div class="metric">
          <div class="metric-label">RVOL</div>
          <div class="metric-value rvol-val">${s.rvol.toFixed(2)}</div>
        </div>
        <div class="metric">
          <div class="metric-label">補正A3</div>
          <div class="metric-value score-val">${s.scoreA3}</div>
        </div>
        <div class="metric">
          <div class="metric-label">変化率</div>
          <div class="metric-value" style="color:${s.changePct >= 0 ? 'var(--green)' : 'var(--red)'}">
            ${s.changePct >= 0 ? '+' : ''}${s.changePct.toFixed(1)}%
          </div>
        </div>
      </div>
    </div>
  `).join('');

  document.getElementById('cards').innerHTML = cardsHTML;
  document.getElementById('aiAnalysis').textContent = aiText;
  document.getElementById('timestamp').textContent = 
    '分析時刻: ' + new Date().toLocaleTimeString('ja-JP');
  
  document.getElementById('results').classList.add('active');
  document.getElementById('analyzeBtn').disabled = false;
  document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  if (msg) {
    box.textContent = msg;
    box.classList.add('active');
  } else {
    box.classList.remove('active');
  }
}

// 初回自動読み込み
window.onload = () => loadCSV();
</script>
</body>
</html>
