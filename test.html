<h1>銘柄リアルタイムボード</h1>

<div id="csv-update-time" style="font-weight:bold;color:#d9534f;margin-bottom:10px;">
CSVデータ読み込み中...
</div>

<div id="last-load" style="font-size:0.75rem;color:#94a3b8;margin-bottom:20px;"></div>

<div class="info-text">
※自動更新作動中は５分毎に更新されます。 <br>
※RVOL×補正係数が1.5以上。且つ前日比プラスなら買いサイン。補正係数は「330÷経過分数」です。<br>
※買いサインが出ていれば後はVWAPとの位置関係とチャートを見て上がりそうならインです。<br>
※２０日平均出来高は手動入力のためデータは最新ではありません。そのため誤差があります。<br>
※出来高が落ち着く9：30以降のほうが精度が高い
</div>

<div class="table-container">
<table id="csv-table">
<thead id="table-header"></thead>
<tbody id="table-body"></tbody>
</table>
</div>

<script>

async function loadCSV(){

try{

const response=await fetch('data_push.csv',{cache:"no-store"});
const data=await response.text();
const rows=data.split(/\r?\n/).filter(r=>r.trim()!=="");

const tableHeader=document.getElementById('table-header');
const tableBody=document.getElementById('table-body');

tableHeader.innerHTML='';
tableBody.innerHTML='';

let headers=[];

rows.forEach((row,index)=>{

if(row.includes("Update:")){

document.getElementById('csv-update-time').textContent='最終更新: '+row.split(',')[0].replace("Update:","").trim();
return;

}

const columns=row.split(',');
const tr=document.createElement('tr');

columns.forEach((colText,colIndex)=>{

const cell=(index===0)?document.createElement('th'):document.createElement('td');

let val=colText.replace(/"/g,'').trim();

if(index===0){

headers.push(val);

}

else{

const header=headers[colIndex]?headers[colIndex].toLowerCase():"";

if(header.includes("rvol")){

let num=parseFloat(val);

if(!isNaN(num)){

if(num>=2){

cell.classList.add("volume-spike");

}

val=num.toFixed(2);

}

}

}

cell.textContent=val;

if(val==="買い"){

cell.classList.add('buy-highlight');

}

tr.appendChild(cell);

});

if(index===0){

tableHeader.appendChild(tr);

}else{

tableBody.appendChild(tr);

}

});

document.getElementById('last-load').textContent='ブラウザ更新: '+new Date().toLocaleString();

}catch(e){

console.error(e);

}

}

loadCSV();

setInterval(loadCSV,30000);

</script>
