<div class="info-text">
    <strong>【データ更新】</strong> 5分毎に自動更新されます。<br>
    <strong>【背景色の意味】</strong> <span style="background:var(--highlight-bg); padding:2px 6px; border-radius:4px; border:1px solid #fee2e2;">薄いオレンジ</span>：AIスコア基準クリア銘柄 / <span>白色</span>：特別監視銘柄<br>
    <small ...>※判定条件：(A3 × 補正RVOL) ≧ 180 ＋ **補正RVOL 1.5以上** ＋ VWAPより上で「🔥買い」を表示。</small>
</div>

<div class="table-container">
    <div class="scroll-wrapper">
        <table id="csv-table">
            <thead id="table-header"></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
function formatNum(val) {
    let n = parseFloat(val.replace(/,/g, ''));
    if (isNaN(n)) return val;
    if (val.includes('.')) return val;
    return n.toLocaleString();
}

async function loadCSV(){
    try{
        const response = await fetch('data_push.csv',{cache:"no-store"});
        const data = await response.text();
        const rows = data.split(/\r?\n/).filter(r=>r.trim()!=="")
        const tableHeader = document.getElementById('table-header')
        const tableBody = document.getElementById('table-body')

        tableHeader.innerHTML = ''
        tableBody.innerHTML = ''
        
        // 非表示にする列（3:前日差、7:20日平均、11:区分フラグなどは表示しない）
        const hideIndices = [3, 7, 11];

        rows.forEach((row, index) => {
            if(row.includes("Update:")){
                document.getElementById('csv-update-time').innerHTML = 
                    '<span style="font-size:0.85rem; color:#64748b; font-weight:normal;">最終更新:</span> ' + row.split(',')[0].replace("Update:","").trim();
                return
            }

            const columns = row.split(',')
            const tr = document.createElement('tr')

            // 背景色ハイライト（CSVの11列目フラグを見て行全体の色を変える）
            if(index !== 0 && columns[11]) {
                if(columns[11].replace(/"/g,'').trim() === "1") {
                    tr.classList.add('row-highlight');
                }
            }

            // 表示する範囲（0〜10列目まで）
            for(let i = 0; i <= 10; i++) {
                if(hideIndices.includes(i)) continue;

                const colText = columns[i] || "";
                const cell = (index === 0) ? document.createElement('th') : document.createElement('td')
                let val = colText.replace(/"/g,'').trim()

                if(index === 0){
                    cell.textContent = val;
                } else {
                    // --- セルごとの整形 ---
                    if(i === 0) {
                        cell.textContent = val.replace(/,/g, ''); // コード列
                    } else if(i === 8 || i === 9) {
                        // RVOL系
                        cell.classList.add("col-rvol-style");
                        let num = parseFloat(val);
                        if(!isNaN(num)){
                            if(num >= 2) cell.classList.add("volume-spike");
                            cell.textContent = num.toFixed(2);
                        } else { cell.textContent = val; }
                    } else if(i === 10) {
                        // 判定列（Excelで出した「🔥買い」などをそのまま表示）
                        cell.textContent = val;
                        if(val.includes("買い")) {
                            cell.classList.add("buy-highlight");
                        }
                    } else {
                        // 通常の数値整形
                        let numVal = parseFloat(val.replace(/,/g,''));
                        cell.textContent = (!isNaN(numVal) && val.length > 3 && !val.includes('.')) 
                                           ? formatNum(val) : val;
                    }
                }
                tr.appendChild(cell)
            }

            if(index === 0) tableHeader.appendChild(tr);
            else tableBody.appendChild(tr);
        })
        document.getElementById('last-load').textContent = 'ブラウザ更新: ' + new Date().toLocaleTimeString();
    } catch(e) { console.error(e) }
}

loadCSV();
setInterval(loadCSV, 30000); // 30秒ごとにブラウザ側でCSVを再読込
</script>
