<!DOCTYPE html>
<html lang="ja">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5JCN1FB7ML"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-5JCN1FB7ML');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIスコア投資研究所 — Mika's Selection</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0a0e1a;
            --card: #111827;
            --border: #1e2d4a;
            --gold: #f0a500;
            --blue: #4da6ff;
            --green: #00d4a0;
            --text: #e8edf5;
            --text2: #8a9bb8;
            --bolt: #ffeb3b;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
        }

        .main-container {
            max-width: 1100px;
            margin: auto;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
        }

        .mika-panel {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .picks-grid {
            display: grid;
            gap: 15px;
        }

        .pick-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 15px;
            display: grid;
            grid-template-columns: 60px 1fr 200px;
            gap: 10px;
            align-items: center;
            position: relative;
        }

        .pick-card.has-bolt {
            border-color: var(--bolt);
        }

        .rank-badge {
            color: var(--gold);
            font-weight: bold;
        }

        .code { color: var(--blue); }

        .metric-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .bolt-label {
            position: absolute;
            top: -10px;
            right: 10px;
            background: var(--bolt);
            color: #000;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .loading {
            text-align: center;
            color: var(--gold);
            margin-top: 50px;
        }
    </style>
</head>

<body>

<div id="loading" class="loading">MIKA ANALYSING...</div>

<div class="main-container">

    <div class="mika-panel">
        <div style="font-weight:bold;color:var(--gold)">AI Mika Analyser</div>
        <div style="font-size:12px;margin-top:10px;">
            ※AIスコア180以上 / VWAP / 信用倍率20未満
        </div>
    </div>

    <div>
        <div id="pickCards" class="picks-grid"></div>
    </div>

</div>

<script>

let prevVolumeMap = new Map();

async function fetchData() {
    const res = await fetch('data_push.csv', { cache: "no-store" });
    const text = await res.text();
    const rows = text.split(/\n/).map(l => l.split(','));
    processData(rows);
    document.getElementById('loading').style.display = 'none';
}

function getElapsed() {
    const n = new Date();
    const s = new Date(n.getFullYear(), n.getMonth(), n.getDate(), 9, 0);
    return Math.max(1, (n - s) / 60000);
}

function processData(rows) {

    const elapsed = getElapsed();

    const all = rows.map(r => {

        const code = r[0];
        const name = r[1];
        const price = parseFloat(r[2] || 0);
        const vol = parseFloat(r[4] || 0);
        const vwap = parseFloat(r[5] || 0);
        const rvol = parseFloat(r[9] || 0);
        const judge = r[10] || "";
        const a3 = parseFloat(r[14] || 0); // ←補正A3（そのまま使う）
        const marginRatio = parseFloat(r[17] || 0);

        let hasBolt = false;
        if (prevVolumeMap.has(code)) {
            const diff = vol - prevVolumeMap.get(code);
            const avg = (vol * (330 / elapsed)) / 66;
            if (diff > avg * 2 && diff > 1000) hasBolt = true;
        }
        prevVolumeMap.set(code, vol);

        return { code, name, price, vwap, rvol, a3, judge, marginRatio, hasBolt };
    });

    const picks = all.filter(d =>
        (d.judge.includes('🔥') || d.judge.includes('買い')) &&
        d.a3 >= 180 &&
        d.price >= d.vwap * 0.995 &&
        d.price <= d.vwap * 1.05 &&
        d.marginRatio < 20
    )
    .sort((a, b) => b.a3 - a.a3)
    .slice(0, 3);

    render(picks);
}

function render(picks){

    const el = document.getElementById('pickCards');

    if(picks.length === 0){
        el.innerHTML = "該当銘柄なし";
        return;
    }

    el.innerHTML = picks.map((p,i)=>`
        <div class="pick-card ${p.hasBolt?'has-bolt':''}">
            ${p.hasBolt?'<div class="bolt-label">⚡</div>':''}
            <div class="rank-badge">#${i+1}</div>
            <div>
                <div class="code">${p.code}</div>
                <div>${p.name}</div>
            </div>
            <div class="metric-group">
                <div>AI ${p.a3.toFixed(0)}</div>
                <div>RVOL ${p.rvol.toFixed(2)}</div>
            </div>
        </div>
    `).join('');
}

fetchData();
setInterval(fetchData, 30000);

</script>

</body>
</html>
