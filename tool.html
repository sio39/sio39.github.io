<!DOCTYPE html>
<html lang="ja">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5JCN1FB7ML"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-5JCN1FB7ML');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI MIKA 厳選銘柄分析 | AIスコア投資研究所</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --primary: #4da3ff;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --gold: #f0a500;
        }

        body {
            font-family: "Inter", "Segoe UI", "Hiragino Sans", "Meiryo", sans-serif;
            margin: 0;
            padding: 90px 15px 60px; /* ナビの高さに合わせて調整 */
            background: var(--bg);
            color: var(--text-main);
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- 以前のシンプルなナビゲーションを復元 --- */
        .header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            z-index: 9999;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: center;
            padding: 10px 0;
        }

        .header-container {
            width: 100%;
            max-width: 850px;
            padding: 0 15px;
            display: flex;
            flex-direction: column; /* スマホでは縦並びに */
            align-items: center;
            gap: 10px;
        }

        @media (min-width: 600px) {
            .header-container { flex-direction: row; justify-content: space-between; padding: 5px 20px; }
        }

        .logo { font-size: 18px; font-weight: 800; color: var(--primary); text-decoration: none; }

        nav { display: flex; gap: 15px; }
        nav a { color: var(--text-sub); text-decoration: none; font-weight: 600; font-size: 14px; }
        nav a.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        /* --- コンテンツエリア --- */
        .container { width: 100%; max-width: 700px; }
        h1 { font-size: 1.4rem; text-align: center; margin: 10px 0 25px; color: #0f172a; }

        .analysis-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            position: relative;
        }

        .rank-badge {
            position: absolute; top: -12px; left: 15px;
            background: var(--gold); color: white;
            padding: 3px 12px; border-radius: 20px; font-weight: 800; font-size: 0.8rem;
        }

        .stock-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid #f1f5f9; padding-bottom: 12px; margin-bottom: 15px; }
        .stock-info .code { font-family: monospace; font-size: 1.1rem; color: var(--primary); font-weight: 700; }
        .stock-info .name { font-size: 1.2rem; font-weight: 800; display: block; }
        .score-box { text-align: right; }
        .score-val { font-size: 1.8rem; font-weight: 900; color: var(--gold); line-height: 1; }
        .score-label { font-size: 0.6rem; color: var(--text-sub); font-weight: 700; }

        .section-title { font-weight: 800; font-size: 0.9rem; margin: 15px 0 8px; display: flex; align-items: center; gap: 6px; color: #334155; }
        .section-title i { color: var(--primary); font-size: 0.8rem; }
        
        .ir-box { background: #f8fafc; padding: 12px; border-radius: 10px; font-size: 0.85rem; border-left: 4px solid var(--primary); color: #475569; }
        .mika-comment { background: #fffcf0; padding: 12px; border-radius: 10px; font-size: 0.9rem; border: 1px solid #fef3c7; position: relative; margin-top: 15px; }
        .mika-comment::before { content: "👩‍💼"; position: absolute; top: -12px; left: 10px; font-size: 1.1rem; }

        .loading { text-align: center; padding: 50px; font-weight: 700; color: var(--text-sub); font-size: 0.9rem; }

        footer { margin-top: 40px; text-align: center; color: var(--text-sub); font-size: 0.75rem; }
    </style>
</head>
<body>

<header class="header">
    <div class="header-container">
        <a href="index.html" class="logo">AIスコア投資研究所</a>
        <nav>
            <a href="index.html">TOP</a>
            <a href="realtime.html">リアルボード</a>
            <a href="aimika.html" class="active">AI MIKA分析</a>
        </nav>
    </div>
</header>

<div class="container">
    <h1>👩‍💼 AI MIKA 厳選3銘柄分析</h1>
    <div id="analysis-container">
        <div class="loading">最新データを解析中...</div>
    </div>
</div>

<script>
async function loadAndAnalyze() {
    try {
        const response = await fetch('data_push.csv', {cache: "no-store"});
        const data = await response.text();
        const rows = data.split(/\r?\n/).filter(r => r.trim() !== "");
        
        const picks = rows.slice(1).map(row => {
            const c = row.split(',');
            if (c.length < 17) return null;
            return {
                code: c[0].replace(/"/g,'').trim(),
                name: c[1].replace(/"/g,'').trim(),
                price: parseFloat(c[2]?.replace(/,/g,'') || 0),
                vwap: parseFloat(c[5]?.replace(/,/g,'') || 0),
                a3: parseFloat(c[13] || 0),
                margin: parseFloat(c[16]?.replace(/,/g,'') || 0),
                judge: c[10] || ""
            };
        }).filter(d => d && d.a3 >= 180 && d.margin < 20 && d.price > d.vwap && (d.judge.includes("🔥") || d.judge.includes("買い")))
          .sort((a,b) => b.a3 - a.a3).slice(0, 3);

        renderAnalysis(picks);
    } catch (e) {
        document.getElementById('analysis-container').innerHTML = "<div class='loading'>データの読み込みに失敗しました。</div>";
    }
}

function renderAnalysis(picks) {
    const container = document.getElementById('analysis-container');
    if (picks.length === 0) {
        container.innerHTML = "<div class='loading'>現在、条件を満たす銘柄はありません。</div>";
        return;
    }

    container.innerHTML = picks.map((p, i) => `
        <div class="analysis-card">
            <div class="rank-badge">PICK UP #${i+1}</div>
            <div class="stock-header">
                <div class="stock-info">
                    <span class="code">${p.code}</span>
                    <span class="name">${p.name}</span>
                </div>
                <div class="score-box">
                    <div class="score-label">AI SCORE</div>
                    <div class="score-val">${p.a3.toFixed(1)}</div>
                </div>
            </div>

            <div class="section-title"><i class="fa-solid fa-bullhorn"></i> 最新IR・ニュースの要約</div>
            <div class="ir-box">${getDummyIR(p.code)}</div>

            <div class="section-title"><i class="fa-solid fa-comment-dots"></i> Mika's Eye</div>
            <div class="mika-comment">${getMikaComment(p.code, p.name)}</div>
        </div>
    `).join('');
}

function getDummyIR(code) {
    const data = {
        "3350": "継続的なビットコイン購入戦略により保有資産の価値が向上。新しい資本配分方針を発表し、市場から高い関心を集めています。",
        "default": "直近の決算または適時開示にて、堅調な業績進捗や株主還元策が確認されています。AIスコアが示す割安性と需給が噛み合った初動の形です。"
    };
    return data[code] || data["default"];
}

function getMikaComment(code, name) {
    if(code === "3350") return "メタプラネットは日本で唯一の戦略を取っている面白い会社ね。価格がVWAPをしっかり超えているのが強さの証拠よ✨";
    return `${name}は、AIスコアで見ても優等生ね。信用倍率が20倍以下で需給が軽いのも大きなプラス材料。今の形を崩さないか見守っていきましょう！`;
}

loadAndAnalyze();
</script>

</body>
</html>
