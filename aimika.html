<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIスコア投資研究所 — Mika's Selection</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: #0f1628;
    --bg3: #151e35;
    --card: #111827;
    --border: #1e2d4a;
    --accent: #f0a500;
    --green: #00d4a0;
    --blue: #4da6ff;
    --text: #e8edf5;
    --text2: #8a9bb8;
    --text3: #5a6b8a;
    --gold: #f0a500;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow: hidden; }

  /* 背景のグリッド装飾 */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(77,166,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(77,166,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }

  .container { max-width: 1200px; margin: 0 auto; height: 100vh; padding: 30px; position: relative; z-index: 1; display: flex; flex-direction: column; }
  
  header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
  .logo-area h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--gold); }
  .logo-area p { font-size: 0.8rem; color: var(--text3); font-family: 'DM Mono', monospace; letter-spacing: 0.1em; }

  /* メインレイアウト：Mikaの判定を中央に大きく */
  .app-layout { display: flex; flex-direction: column; gap: 30px; flex-grow: 1; align-items: center; }

  /* 統計バー：精査状況をさりげなく表示 */
  .stats-bar { display: flex; gap: 20px; width: 100%; justify-content: center; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px 25px; min-width: 180px; text-align: center; border-top: 3px solid var(--border); }
  .stat-card.gold { border-top-color: var(--gold); }
  .stat-card.green { border-top-color: var(--green); }
  .stat-label { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; margin-bottom: 5px; }
  .stat-value { font-size: 1.8rem; font-weight: 700; font-family: 'DM Mono', monospace; }

  /* Mikaのメッセージパネル */
  .mika-intro-panel { background: var(--card); border-radius: 20px; padding: 25px; width: 100%; max-width: 900px; border-left: 5px solid var(--gold); }
  .mika-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
  .mika-avatar { font-size: 2rem; }
  .mika-name { font-size: 1rem; font-weight: 700; color: var(--text); }
  .mika-speech { font-size: 0.9rem; line-height: 1.8; color: var(--text2); }

  /* 判定結果カードエリア */
  .picks-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; width: 100%; max-width: 1100px; }
  .pick-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; transition: all 0.3s ease; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
  .pick-card:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 0 20px rgba(240,165,0,0.1); }
  
  .pick-card-header { background: rgba(240,165,0,0.07); padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .pick-rank { color: var(--gold); font-weight: 800; font-size: 1.1rem; font-family: 'Playfair Display', serif; }
  .pick-code { color: var(--blue); font-family: 'DM Mono', monospace; font-size: 1rem; font-weight: 500; }
  
  .pick-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
  .pick-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 15px; text-align: center; }
  
  .pick-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
  .metric { background: var(--bg3); border-radius: 10px; padding: 10px; text-align: center; }
  .metric-label { font-size: 0.65rem; color: var(--text3); margin-bottom: 4px; }
  .metric-value { font-size: 1.1rem; font-weight: 700; font-family: 'DM Mono', monospace; }

  .pick-comment { font-size: 0.8rem; line-height: 1.7; color: var(--text2); background: rgba(255,255,255,0.02); padding: 12px; border-radius: 10px; border-left: 2px solid var(--gold); }

  /* ローディング画面 */
  .loading-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
  .loading-overlay.active { display: flex; }
  .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div id="loadingText" style="font-family:'DM Mono', monospace; font-size:0.9rem;">MIKA IS ANALYZING...</div>
</div>

<div class="container">
  <header>
    <div class="logo-area">
      <h1>AIスコア投資研究所</h1>
      <p>MIKA'S PRECISION SELECTION v5.0</p>
    </div>
  </header>

  <div class="app-layout" id="appLayout" style="display:none">
    
    <div class="stats-bar">
      <div class="stat-card"><div class="stat-label">スキャン銘柄数</div><div class="stat-value" id="statTotal">—</div></div>
      <div class="stat-card green"><div class="stat-label">厳選通過数</div><div class="stat-value" id="statPass">—</div></div>
    </div>

    <div class="mika-intro-panel">
      <div class="mika-header">
        <div class="mika-avatar">👩‍💼</div>
        <div class="mika-name">Mika — 主任アナリスト</div>
      </div>
      <div class="mika-speech" id="mikaIntroText">
        データを解析中です…✨
      </div>
    </div>

    <div class="picks-container" id="pickCards"></div>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
let allData = [];
const CSV_URL = 'https://raw.githubusercontent.com/sio39/sio39.github.io/main/data_push.csv';

window.onload = fetchGitHubData;

async function fetchGitHubData() {
  showLoading('最新データを取得中...');
  try {
    const response = await fetch(CSV_URL);
    if (!response.ok) throw new Error('Fetch failed');
    const csvText = await response.text();
    const wb = XLSX.read(csvText, { type: 'string' });
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
    processRows(rows);
  } catch (err) {
    alert('データが読み込めませんでした');
    hideLoading();
  }
}

function processRows(rows) {
  const dataRows = rows.filter((r, i) => i > 0 && r[0]);
  allData = dataRows.map(r => ({
    code: String(r[0] ?? '').trim(),
    name: String(r[1] ?? '').trim(),
    price: parseNum(r[2]),
    vwap: parseNum(r[5]),
    volume: parseNum(r[4]), 
    changeRatio: parseNum(r[7]), 
    judgment: String(r[10] ?? '').trim(),
    rvol: parseNum(r[9]),
    a3corr: parseNum(r[13]),
    credit: parseNum(r[16])
  }));
  analyzeAndRender();
  hideLoading();
}

function parseNum(v) {
  if (v === undefined || v === null || v === '') return NaN;
  const s = String(v).replace(/[,，%％倍]/g, '').trim();
  return parseFloat(s);
}

function analyzeAndRender() {
  const firePassed = allData.filter(d => d.judgment.includes('🔥') || d.judgment.includes('買い'));
  const fullPass = firePassed.filter(d => d.a3corr >= 180 && d.price > d.vwap && (isNaN(d.credit) || d.credit <= 10));
  const selectedPicks = [...fullPass].sort((a,b) => b.a3corr - a.a3corr).slice(0, 3);

  document.getElementById('statTotal').textContent = allData.length;
  document.getElementById('statPass').textContent = fullPass.length;
  document.getElementById('appLayout').style.display = 'flex';
  
  renderMika(selectedPicks);
}

function renderMika(picks) {
  const introEl = document.getElementById('mikaIntroText');
  const pickEl = document.getElementById('pickCards');

  if (picks.length === 0) {
    introEl.textContent = '今日は私の基準を100%クリアする銘柄が見つかりませんでした。無理せず、チャンスを待ちましょうね。';
    pickEl.innerHTML = "";
    return;
  }

  introEl.innerHTML = `今日のマーケットを精査したよ！<br>補正A3スコアが良くて、需給も安定している「今、注目すべき3銘柄」を選んだから参考にしてね✨`;

  pickEl.innerHTML = picks.map((d, i) => `
    <div class="pick-card">
      <div class="pick-card-header"><span class="pick-rank">TOP ${i+1}</span><span class="pick-code">${d.code}</span></div>
      <div class="pick-body">
        <div class="pick-name">${d.name}</div>
        <div class="pick-metrics">
          <div class="metric"><div class="metric-label">補正A3</div><div class="metric-value" style="color:var(--gold)">${d.a3corr.toFixed(1)}</div></div>
          <div class="metric"><div class="metric-label">RVOL</div><div class="metric-value" style="color:var(--green)">${d.rvol.toFixed(2)}</div></div>
        </div>
        <div class="pick-comment">
          補正A3が <strong>${d.a3corr.toFixed(1)}</strong> と高く、トレンドの勢いが強いわ。需給も安心できる水準よ！✨
        </div>
      </div>
    </div>
  `).join('');
}

function showLoading(txt) { document.getElementById('loadingOverlay').classList.add('active'); }
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }
</script>
</body>
</html>
