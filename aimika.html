<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI MIKA 厳選銘柄分析 | AIスコア投資研究所</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --primary: #4da3ff;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --gold: #f0a500;
            --accent: #ef4444;
        }

        body {
            font-family: "Hiragino Sans", "Meiryo", sans-serif;
            margin: 0; padding: 100px 15px 60px;
            background: var(--bg); color: var(--text-main);
            line-height: 1.6;
            display: flex; flex-direction: column; align-items: center;
        }

        /* ヘッダー共通スタイル */
        .header {
            position: fixed; top: 0; left: 0; width: 100%;
            background: white; border-bottom: 1px solid #e2e8f0;
            padding: 15px 0; z-index: 1000; display: flex; justify-content: center;
        }
        .header-container { width: 100%; max-width: 900px; display: flex; justify-content: space-between; padding: 0 20px; }
        .logo { font-weight: 800; color: var(--primary); text-decoration: none; font-size: 1.2rem; }

        .container { width: 100%; max-width: 800px; }

        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 30px; color: #0f172a; }

        /* 分析カード */
        .analysis-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            position: relative;
        }
        .rank-badge {
            position: absolute; top: -15px; left: 20px;
            background: var(--gold); color: white;
            padding: 5px 15px; border-radius: 20px; font-weight: 800; font-size: 0.9rem;
        }
        .stock-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; margin-bottom: 20px; }
        .stock-info .code { font-family: monospace; font-size: 1.2rem; color: var(--primary); font-weight: 700; }
        .stock-info .name { font-size: 1.4rem; font-weight: 800; display: block; }
        .score-box { text-align: right; }
        .score-val { font-size: 2rem; font-weight: 900; color: var(--gold); line-height: 1; }
        .score-label { font-size: 0.7rem; color: #64748b; font-weight: 700; }

        /* 分析コンテンツ */
        .section-title { font-weight: 800; font-size: 1rem; margin: 20px 0 10px; display: flex; align-items: center; gap: 8px; color: #334155; }
        .section-title i { color: var(--primary); }
        
        .ir-box { background: #f8fafc; padding: 15px; border-radius: 12px; font-size: 0.9rem; border-left: 4px solid var(--primary); }
        .mika-comment { background: #fffcf0; padding: 15px; border-radius: 12px; font-size: 0.95rem; border: 1px solid #fef3c7; position: relative; }
        .mika-comment::before { content: "👩‍💼"; position: absolute; top: -12px; left: 10px; font-size: 1.2rem; }

        .loading { text-align: center; padding: 50px; font-weight: 700; color: var(--text-sub); }
    </style>
</head>
<body>

<header class="header">
    <div class="header-container">
        <a href="index.html" class="logo">AIスコア投資研究所</a>
        <a href="realtime.html" style="text-decoration:none; color:#64748b; font-weight:700; font-size:0.9rem;">← ボードに戻る</a>
    </div>
</header>

<div class="container">
    <h1>👩‍💼 AI MIKA 本日の深掘り分析</h1>
    <div id="analysis-container">
        <div class="loading">最新データを解析中...</div>
    </div>
</div>

<script>
async function loadAndAnalyze() {
    try {
        const response = await fetch('data_push.csv', {cache: "no-store"});
        const data = await response.text();
        const rows = data.split(/\r?\n/).filter(r => r.trim() !== "");
        
        // 厳選3銘柄を抽出（リアルタイムボードと同じロジック）
        const picks = rows.slice(1).map(row => {
            const c = row.split(',');
            if (c.length < 17) return null;
            return {
                code: c[0].replace(/"/g,'').trim(),
                name: c[1].replace(/"/g,'').trim(),
                price: parseFloat(c[2]?.replace(/,/g,'') || 0),
                vol: parseFloat(c[4]?.replace(/,/g,'') || 0),
                vwap: parseFloat(c[5]?.replace(/,/g,'') || 0),
                a3: parseFloat(c[13] || 0),
                margin: parseFloat(c[16]?.replace(/,/g,'') || 0),
                judge: c[10] || ""
            };
        }).filter(d => d && d.a3 >= 180 && d.margin < 20 && d.price > d.vwap && d.judge.includes("買い"))
          .sort((a,b) => b.a3 - a.a3).slice(0, 3);

        renderAnalysis(picks);
    } catch (e) {
        document.getElementById('analysis-container').innerHTML = "データの読み込みに失敗しました。";
    }
}

function renderAnalysis(picks) {
    const container = document.getElementById('analysis-container');
    if (picks.length === 0) {
        container.innerHTML = "<div class='loading'>現在、厳選基準を満たす銘柄はありません。</div>";
        return;
    }

    container.innerHTML = picks.map((p, i) => `
        <div class="analysis-card">
            <div class="rank-badge">PICK UP #${i+1}</div>
            <div class="stock-header">
                <div class="stock-info">
                    <span class="code">${p.code}</span>
                    <span class="name">${p.name}</span>
                </div>
                <div class="score-box">
                    <div class="score-label">AI SCORE (A3)</div>
                    <div class="score-val">${p.a3.toFixed(1)}</div>
                </div>
            </div>

            <div class="section-title"><i class="fa-solid fa-bullhorn"></i> 最新IR・材料の要約</div>
            <div class="ir-box">
                ${getDummyIR(p.code)}
            </div>

            <div class="section-title"><i class="fa-solid fa-comment-dots"></i> Mika's Eye（ここが買い！）</div>
            <div class="mika-comment">
                ${getMikaComment(p.code, p.name)}
            </div>
            
            <div style="margin-top:20px; text-align:right;">
                <a href="https://www.buffett-code.com/quarterly/${p.code}" target="_blank" style="font-size:0.8rem; color:var(--primary); font-weight:700;">
                    バフェット・コードで詳細を見る <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>
            </div>
        </div>
    `).join('');
}

// 銘柄ごとのダミーIR（実際にはここをAIに生成させるか、手動で更新します）
function getDummyIR(code) {
    const data = {
        "3350": "直近でビットコインの追加購入を完了し、保有枚数が大幅に増加。1株あたりのBTC保有量（BTCイールド）の成長が継続しています。財務レバレッジを活用した独自の資本戦略が市場で注目されています。",
        "default": "最新の適時開示にて業績予想の上方修正、または株主還元の強化が発表されています。RVOL（相対出来高）が上昇しており、大口投資家の資金流入が期待できる局面です。"
    };
    return data[code] || data["default"];
}

// Mikaのコメント生成
function getMikaComment(code, name) {
    if(code === "3350") return "メタプラネットは、単なる投資会社を超えて『ビットコイン・スタンダード』を地で行く唯一無二の存在ね。A3スコアが高いのは、将来の含み益を市場が織り込み始めている証拠。VWAPより上で推移している間は、強気で見ていいと思うわ！";
    return `${name}は、指標面（PER/ROE）のバランスがすごくいいわね。今の株価位置はVWAPをしっかり超えていて、買い方の勢いが勝っている状態。信用倍率も20倍以下で軽いから、上値が期待できそうな「優等生銘柄」よ✨`;
}

loadAndAnalyze();
</script>

</body>
</html>
