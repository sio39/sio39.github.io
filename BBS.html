:root {
  --primary-color: #3b82f6;
  --primary-dark: #1d4ed8;
  --text-main: #0f172a;
  --text-sub: #475569;
  --bg-color: #f1f5f9;

  --border-color: #e2e8f0;

/* --- ヘッダー --- */
.header {
  position: fixed;
  top: 0; left: 0; width: 100%;
  background: var(--header-bg);
  backdrop-filter: blur(8px);
  z-index: 9999;
  border-bottom: 1px solid var(--border-color);
  box-shadow: var(--shadow-sm);
  height: 70px;
  display: flex;
  align-items: center;
}

.header-container {
  width: 100%;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 40px;
}

.logo {
  font-size: 22px;
  font-weight: 800;
  color: var(--text-main);
  letter-spacing: -0.5px;
}
.logo span { color: var(--primary-color); }

nav { display: flex; gap: 5px; }

nav a {
  color: var(--text-sub);
  font-weight: 600;
  font-size: 15px;
  padding: 8px 16px;
  border-radius: 8px;
}
nav a:hover {
  background-color: #eff6ff;
  color: var(--primary-color);
}
nav a.active {
  background-color: var(--primary-color);
  color: white;
}

.header-sns { display: flex; align-items: center; gap: 10px; }

.sns-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px; height: 36px;
  border-radius: 10px;
  color: white;
  font-size: 18px;
}
.sns-icon.x { background: #14171a; }
.sns-icon.youtube { background: #ff0000; }
.sns-icon.note { background: #2cb696; font-weight: 800; font-size: 15px; }
.sns-icon:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); opacity: 0.9; }

/* --- メイン --- */
main {
  max-width: 850px;
  margin: 0 auto;
  padding: 40px 20px 80px 20px;
}

.page-title {
  font-size: 2rem;
  font-weight: 900;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}
.page-subtitle {
  color: var(--text-sub);
  font-size: 1rem;
  margin-bottom: 32px;
}

/* BBSヘッダーカード */
.bbs-intro {
  background: var(--card-bg);
  padding: 24px 28px;
  border-radius: 16px;
  border: 1px solid var(--border-color);
  box-shadow: var(--shadow-sm);
  margin-bottom: 28px;
}
.bbs-intro h2 {
  font-size: 1.2rem;
  font-weight: 800;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.bbs-intro p {
  color: var(--text-sub);
  font-size: 0.95rem;
  margin-bottom: 4px;
}
.bbs-intro .highlight {
  color: #dc2626;
  font-weight: 700;
}

/* Disqusラッパー */
.disqus-wrap {
  background: var(--card-bg);
  border-radius: 16px;
  border: 1px solid var(--border-color);
  box-shadow: var(--shadow-sm);
  padding: 28px;
}

/* --- フッター --- */
.footer {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-sub);
  font-size: 0.95rem;
  border-top: 1px solid var(--border-color);
  background: var(--card-bg);
  margin-top: 80px;
}
.footer-copy { font-weight: 600; margin-bottom: 20px; }

/* --- スマホ --- */
@media (max-width: 768px) {

  .page-title { font-size: 1.6rem; }
  .bbs-intro { padding: 20px; }
  .disqus-wrap { padding: 16px; }
}
